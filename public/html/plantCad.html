<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Lucas Queiroz da Silva">
        <meta name="description" content="A web client for an IoT garden">
        <link rel="icon" href="../img/icon/plant.png" type="image/x-icon">
        <title>Plant register</title>
        <link rel="stylesheet" href="../css/myNavBar.css" type="text/css">
        <link rel="stylesheet" href="../css/plantCad.css" type="text/css">
    </head>
    <body>
        <header>
            <div id="myNavBar"> 
            </div>
        </header>
        <main>
            <div id="form">
                <label for="pname">Plant name</label><br>
                <input type="text" id="pname" name="pname"><br>
                <label for="pimage">Plant image link</label><br>
                <input type="text" id="pimage" name="pimage"><br>
                <label for="pdescription">Plant description</label><br>
                <textarea id="pdescription" name="pdescription" rows="5" cols="50" placeholder="Describe your plant..."></textarea><br>
                <button id="sendData">Register Plant</button>
                <div id="errorMessage">
                </div>
            </div>
        </main>
        <footer>
            <ul>
                <li>Contact me at <a href="mailto:lucasqueirozdbv@gmail.com">my Email Address</a></li>
            </ul>
        </footer>
        <script src="../js/loggedNavBar.js"></script>
        <script src="../js/plantCad.js"></script>
        <script src="../js/newESP.js"></script>
    </body>
</html>
